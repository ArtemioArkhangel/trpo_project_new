name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./pwgen

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        run: make all

      - name: Run tests
        run: make test