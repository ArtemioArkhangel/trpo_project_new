name: CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build
        run: make all
      - name: Run unit tests
        run: make test
      - name: Verify binaries exist
        run: |
          test -f bin/pwgen && echo "✓ pwgen собран" || (echo "✗ pwgen отсутствует" && exit 1)
          test -f bin/test_runner && echo "✓ test_runner собран" || (echo "✗ test_runner отсутствует" && exit 1)
      - name: Lint with clang-format
        continue-on-error: true
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq clang-format
          find src tests -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror