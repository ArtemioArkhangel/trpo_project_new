# Образ для сборки
image: gcc:latest
stages:
  - build
  - test
  - lint
variables:
  CFLAGS: "-Wall -Wextra -Werror -std=c99 -pedantic"
build:
  stage: build
  script:
    - echo "Сборка проекта"
    - make clean
    - make all
    - test -f bin/pwgen && echo "Бинарный файл создан" || (echo "Ошибка сборки" && exit 1)
  artifacts:
    paths:
      - bin/
    expire_in: 1 hour
test:
  stage: test
  needs:
    - build
  script:
    - echo "Сборка и запуск тестов"
    - make test
  artifacts:
    paths:
      - bin/test_runner
    expire_in: 1 hour
lint:
  stage: lint
  allow_failure: true
  script:
    - apt-get update -qq && apt-get install -y -qq clang-format
    - |
      find src tests -name '*.c' -o -name '*.h' | while read f; do
        echo "Проверка: $f"
        clang-format --dry-run --Werror "$f" || echo "Предупреждение: $f требует форматирования"
      done